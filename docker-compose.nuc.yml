services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-tradingagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tradingagent}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  migrate:
    image: migrate/migrate:v4.18.3
    profiles: ['tools']
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        '-path',
        '/migrations',
        '-database',
        'postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradingagent}?sslmode=disable',
        'up',
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradingagent}?sslmode=disable
      OLLAMA_BASE_URL: http://10.0.0.50:11434/v1
      REDIS_URL: redis://redis:6379/0
    ports:
      - '10.0.0.56:${AUGR_API_PORT:-3030}:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      frontend:
      backend:
      monitoring:
        aliases:
          - augr-api

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: production
    ports:
      - '10.0.0.56:${AUGR_WEB_PORT:-3029}:80'
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - frontend

volumes:
  postgres_data:
  redis_data:

networks:
  frontend:
  backend:
    internal: true
  monitoring:
    name: monitoring
    external: true
